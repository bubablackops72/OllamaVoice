<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOICE // OLLAMA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0c0c0e;--surface:#141418;--border:#2a2a32;--accent:#e8ff47;--accent2:#47ffe8;
      --muted:#4a4a58;--text:#d8d8e8;--text-dim:#6e6e82;--user-bg:#1a1a22;--ai-bg:#111118;
      --danger:#ff4757;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);height:100vh;display:flex;flex-direction:column;overflow:hidden}

    #startup-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;}
    #startup-overlay.hidden{display:none}
    .startup-logo{font-size:18px;font-weight:600;letter-spacing:.2em;color:var(--accent);text-transform:uppercase}
    .startup-logo span{color:var(--text-dim)}
    .startup-steps{display:flex;flex-direction:column;gap:10px;min-width:360px}
    .step{display:flex;align-items:center;gap:12px;font-size:12px;letter-spacing:.06em;color:var(--text-dim)}
    .step.done .step-icon{color:var(--accent)}
    .step.active .step-icon{color:var(--accent2);animation:pulse 1s infinite}
    .step.error .step-icon{color:var(--danger)}
    .step.done .step-label{color:var(--text)}
    .step.active .step-label{color:var(--accent2)}
    .step.error .step-label{color:var(--danger)}
    .step-icon{width:16px;text-align:center;flex-shrink:0}
    .startup-ready{font-size:13px;font-weight:600;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;opacity:0;transition:opacity .5s;}
    .startup-ready.visible{opacity:1}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
    .logo{font-size:13px;font-weight:600;letter-spacing:.15em;color:var(--accent);text-transform:uppercase}
    .logo span{color:var(--text-dim)}
    .status-bar{display:flex;align-items:center;gap:20px;font-size:11px;color:var(--text-dim);letter-spacing:.08em}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:6px;transition:background .3s,box-shadow .3s}
    .dot.online{background:var(--accent);box-shadow:0 0 8px var(--accent)}
    .dot.error{background:var(--danger);box-shadow:0 0 8px var(--danger)}
    .dot.working{background:var(--accent2);box-shadow:0 0 8px var(--accent2);animation:pulse 1s infinite}
    .config-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:11px;padding:4px 10px;cursor:pointer;letter-spacing:.08em;transition:border-color .2s,color .2s}
    .config-btn:hover{border-color:var(--accent);color:var(--accent)}

    #config-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:none;gap:16px;flex-wrap:wrap;align-items:center;font-size:12px}
    #config-panel.open{display:flex}
    .cfg-field{display:flex;flex-direction:column;gap:4px}
    .cfg-field label{color:var(--text-dim);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
    .cfg-field input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 10px;width:260px;outline:none;transition:border-color .2s}
    .cfg-field input:focus{border-color:var(--accent2)}

    #chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
    #chat::-webkit-scrollbar{width:4px}
    #chat::-webkit-scrollbar-track{background:transparent}
    #chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .msg{display:flex;gap:14px;padding:14px 16px;border-radius:2px;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .msg.user{background:var(--user-bg);border-left:2px solid var(--accent)}
    .msg.ai{background:var(--ai-bg);border-left:2px solid var(--accent2)}
    .msg.system{border-left:2px solid var(--muted);opacity:.6}
    .msg-role{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;min-width:52px;padding-top:2px;flex-shrink:0}
    .msg.user .msg-role{color:var(--accent)}
    .msg.ai .msg-role{color:var(--accent2)}
    .msg.system .msg-role{color:var(--text-dim)}
    .msg-content{font-size:13.5px;line-height:1.7;color:var(--text);font-family:var(--sans);white-space:pre-wrap;word-break:break-word}
    .msg.system .msg-content{font-family:var(--mono);font-size:12px;color:var(--text-dim)}
    .cursor{display:inline-block;width:8px;height:14px;background:var(--accent2);margin-left:2px;vertical-align:middle;animation:blink .8s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    #transcript-bar{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px 24px;font-size:12px;color:var(--text-dim);display:none;align-items:center;gap:10px;flex-shrink:0}
    #transcript-bar.visible{display:flex}
    #transcript-bar .label{color:var(--accent);font-size:10px;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0}
    #transcript-text{color:var(--text);font-style:italic}

    #controls{padding:18px 24px;display:flex;align-items:center;gap:14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
    #mic-btn{width:54px;height:54px;border-radius:50%;border:2px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s;flex-shrink:0;outline:none}
    #mic-btn:hover:not(:disabled){border-color:var(--accent)}
    #mic-btn.recording{border-color:var(--danger);background:rgba(255,71,87,.08);animation:ring 1.5s infinite}
    #mic-btn:disabled{opacity:.3;cursor:not-allowed}
    @keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,.4)}50%{box-shadow:0 0 0 10px rgba(255,71,87,0)}}
    .mic-icon{width:22px;height:22px}
    #text-input-wrap{flex:1;display:flex;gap:10px;align-items:center}
    #text-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 14px;outline:none;transition:border-color .2s;resize:none;height:44px;line-height:1.4}
    #text-input:focus{border-color:var(--accent2)}
    #text-input::placeholder{color:var(--muted)}
    #send-btn{background:var(--accent);color:var(--bg);border:none;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.1em;padding:10px 18px;cursor:pointer;height:44px;transition:opacity .2s;text-transform:uppercase}
    #send-btn:hover:not(:disabled){opacity:.85}
    #send-btn:disabled{opacity:.3;cursor:not-allowed}
    .divider{height:36px;width:1px;background:var(--border);flex-shrink:0}
    #status-text{font-size:11px;color:var(--text-dim);letter-spacing:.06em;min-width:110px}
    #waveform{display:none;align-items:center;gap:3px;height:30px}
    #waveform.visible{display:flex}
    .bar{width:3px;border-radius:2px;background:var(--danger);transform-origin:bottom center;animation:wave .6s ease-in-out infinite alternate}
    .bar:nth-child(1){animation-delay:.00s;height:8px}.bar:nth-child(2){animation-delay:.10s;height:16px}
    .bar:nth-child(3){animation-delay:.20s;height:24px}.bar:nth-child(4){animation-delay:.15s;height:20px}
    .bar:nth-child(5){animation-delay:.05s;height:10px}
    @keyframes wave{from{transform:scaleY(.3)}to{transform:scaleY(1)}}
    .clear-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:11px;padding:6px 12px;cursor:pointer;letter-spacing:.06em;transition:border-color .2s,color .2s;flex-shrink:0}
    .clear-btn:hover{border-color:var(--danger);color:var(--danger)}
  </style>
</head>
<body>

<div id="startup-overlay">
  <div class="startup-logo">VOICE <span>//</span> OLLAMA</div>
  <div class="startup-steps">
    <div class="step" id="step-ollama">
      <span class="step-icon">○</span>
      <span class="step-label">Connecting to Ollama...</span>
    </div>
    <div class="step" id="step-whisper">
      <span class="step-icon">○</span>
      <span class="step-label">Connecting to Whisper server...</span>
    </div>
    <div class="step" id="step-model">
      <span class="step-icon">○</span>
      <span class="step-label">Checking llama3 model...</span>
    </div>
    <div class="step" id="step-warmup">
      <span class="step-icon">○</span>
      <span class="step-label">Warming up LLM — this may take a minute...</span>
    </div>
    <div class="step" id="step-mic">
      <span class="step-icon">○</span>
      <span class="step-label">Requesting microphone access...</span>
    </div>
  </div>
  <div class="startup-ready" id="startup-ready">✓ System ready — mic is live</div>
</div>

<header>
  <div class="logo">VOICE <span>//</span> OLLAMA</div>
  <div class="status-bar">
    <div id="conn-status"><span class="dot" id="conn-dot"></span><span id="conn-label">checking...</span></div>
    <button class="config-btn" onclick="toggleConfig()">[ config ]</button>
  </div>
</header>

<div id="config-panel">
  <div class="cfg-field"><label>Ollama Host</label><input type="text" id="cfg-host" value="http://localhost:11434"></div>
  <div class="cfg-field"><label>Chat Model</label><input type="text" id="cfg-chat" value="llama3"></div>
  <div class="cfg-field"><label>Transcription URL</label><input type="text" id="cfg-transcribe" value="http://localhost:8080/transcribe"></div>
  <button class="config-btn" style="margin-top:14px" onclick="saveConfig()">[ apply & test ]</button>
</div>

<div id="chat"></div>

<div id="transcript-bar"><div class="label">heard</div><div id="transcript-text"></div></div>

<div id="controls">
  <button id="mic-btn" onclick="toggleRecording()" title="Click to start/stop recording" disabled>
    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text)">
      <rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
    </svg>
  </button>
  <div id="waveform"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
  <div class="divider"></div>
  <div id="text-input-wrap">
    <textarea id="text-input" placeholder="or type a message…" rows="1" disabled
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText();}"></textarea>
    <button id="send-btn" onclick="sendText()" disabled>SEND</button>
  </div>
  <div class="divider"></div>
  <div id="status-text">starting...</div>
  <button class="clear-btn" onclick="clearChat()">clear</button>
</div>

<script>
  let CFG = {
    host:       localStorage.getItem('ol_host')       || 'http://localhost:11434',
    chat:       localStorage.getItem('ol_chat')       || 'llama3',
    transcribe: localStorage.getItem('ol_transcribe') || 'http://localhost:8080/transcribe',
  };

  function toggleConfig() {
    const p = document.getElementById('config-panel');
    p.classList.toggle('open');
    if (p.classList.contains('open')) {
      document.getElementById('cfg-host').value       = CFG.host;
      document.getElementById('cfg-chat').value       = CFG.chat;
      document.getElementById('cfg-transcribe').value = CFG.transcribe;
    }
  }

  function saveConfig() {
    CFG.host       = document.getElementById('cfg-host').value.trim().replace(/\/$/,'');
    CFG.chat       = document.getElementById('cfg-chat').value.trim();
    CFG.transcribe = document.getElementById('cfg-transcribe').value.trim();
    localStorage.setItem('ol_host', CFG.host);
    localStorage.setItem('ol_chat', CFG.chat);
    localStorage.setItem('ol_transcribe', CFG.transcribe);
    document.getElementById('config-panel').classList.remove('open');
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  function setStep(id, state, label) {
    const el = document.getElementById(id);
    el.className = 'step ' + state;
    const icons = { done:'✓', active:'◉', error:'✗', '':'○' };
    el.querySelector('.step-icon').textContent = icons[state] || '○';
    if (label) el.querySelector('.step-label').textContent = label;
  }

  function updateHeaderStatus(state, modelCount) {
    const dot   = document.getElementById('conn-dot');
    const label = document.getElementById('conn-label');
    if (state === 'online') {
      dot.className = 'dot online';
      label.textContent = modelCount ? `online · ${modelCount} model${modelCount!==1?'s':''}` : 'online';
    } else if (state === 'error') {
      dot.className = 'dot error'; label.textContent = 'unreachable';
    } else {
      dot.className = 'dot working'; label.textContent = 'connecting…';
    }
  }

  async function runStartup() {
    // ── Step 1: Ollama API ──────────────────────────────────
    setStep('step-ollama', 'active', 'Connecting to Ollama...');
    let ollamaOk = false;
    for (let i = 0; i < 20; i++) {
      try {
        const r = await fetch(`${CFG.host}/api/tags`, { signal: AbortSignal.timeout(2000) });
        if (r.ok) { ollamaOk = true; break; }
      } catch {}
      await sleep(2000);
    }
    if (!ollamaOk) {
      setStep('step-ollama', 'error', 'Ollama unreachable — is Docker running?');
      setStatus('ollama offline'); return;
    }
    setStep('step-ollama', 'done', 'Ollama connected');

    // ── Step 2: Whisper server ──────────────────────────────
    setStep('step-whisper', 'active', 'Connecting to Whisper server...');
    let whisperOk = false;
    for (let i = 0; i < 20; i++) {
      try {
        const r = await fetch(CFG.transcribe.replace('/transcribe', '/'), { signal: AbortSignal.timeout(2000) });
        if (r.status < 500) { whisperOk = true; break; }
      } catch {}
      await sleep(2000);
    }
    if (!whisperOk) {
      setStep('step-whisper', 'error', 'Whisper server not running');
      setStatus('whisper offline'); return;
    }
    setStep('step-whisper', 'done', 'Whisper server ready');

    // ── Step 3: Model check ─────────────────────────────────
    setStep('step-model', 'active', `Checking ${CFG.chat} model...`);
    let modelOk = false;
    let modelCount = 0;
    try {
      const r = await fetch(`${CFG.host}/api/tags`);
      const d = await r.json();
      const models = (d.models || []).map(m => m.name);
      modelCount = models.length;
      modelOk = models.some(m => m.startsWith(CFG.chat.split(':')[0]));
    } catch {}
    if (!modelOk) {
      setStep('step-model', 'error', `Model "${CFG.chat}" not found — check config`);
      setStatus('model missing'); return;
    }
    setStep('step-model', 'done', `${CFG.chat} model found`);
    updateHeaderStatus('online', modelCount);

    // ── Step 4: LLM warmup ──────────────────────────────────
    setStep('step-warmup', 'active', 'Warming up LLM — please wait...');
    let warmupOk = false;
    try {
      const r = await fetch(`${CFG.host}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: CFG.chat,
          stream: false,
          messages: [{ role: 'user', content: 'hi' }],
        }),
        signal: AbortSignal.timeout(120000), // 2 min timeout for cold start
      });
      if (r.ok) {
        const d = await r.json();
        warmupOk = !!d.message?.content;
      }
    } catch(e) {
      console.warn('Warmup error:', e);
    }
    if (!warmupOk) {
      setStep('step-warmup', 'error', 'LLM did not respond — check Ollama logs');
      setStatus('llm error'); return;
    }
    setStep('step-warmup', 'done', 'LLM is ready');

    // ── Step 5: Microphone ──────────────────────────────────
    setStep('step-mic', 'active', 'Requesting microphone access...');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
      setStep('step-mic', 'done', 'Microphone ready');
    } catch {
      setStep('step-mic', 'error', 'Microphone access denied');
      setStatus('mic denied'); return;
    }

    // ── All good ────────────────────────────────────────────
    const readyEl = document.getElementById('startup-ready');
    readyEl.classList.add('visible');
    await sleep(1200);
    document.getElementById('startup-overlay').classList.add('hidden');
    setBusy(false);
    setStatus('ready');
  }

  // ── Chat ─────────────────────────────────────────────────
  const history = [];

  function addMessage(role, content) {
    history.push({ role: role==='ai'?'assistant':role, content });
    const chat = document.getElementById('chat');
    const div  = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="msg-role">${role==='ai'?'llm':role}</div><div class="msg-content" id="msg-${Date.now()}">${escHtml(content)}</div>`;
    chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
    return div.querySelector('.msg-content');
  }

  function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function clearChat(){ history.length=0; document.getElementById('chat').innerHTML=''; }

  // ── Recording ─────────────────────────────────────────────
  let mediaRecorder=null, audioChunks=[], isRecording=false;

  function getSupportedMime(){
    const t=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
    return t.find(x=>MediaRecorder.isTypeSupported(x))||'';
  }

  async function toggleRecording(){ isRecording ? stopRecording() : await startRecording(); }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMime() });
      mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
      mediaRecorder.onstop = processAudio;
      mediaRecorder.start(100); isRecording = true;
      document.getElementById('mic-btn').classList.add('recording');
      document.getElementById('waveform').classList.add('visible');
      setStatus('recording…');
    } catch(e){ setStatus('mic denied'); }
  }

  function stopRecording() {
    if(mediaRecorder && mediaRecorder.state!=='inactive'){
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    }
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('waveform').classList.remove('visible');
    setStatus('transcribing…');
  }

  async function processAudio() {
    const mime = getSupportedMime() || 'audio/webm';
    const blob = new Blob(audioChunks, { type: mime });
    if (blob.size < 1000) { setStatus('too short'); return; }
    try {
      const ext  = mime.includes('mp4')?'mp4':mime.includes('ogg')?'ogg':'webm';
      const file = new File([blob], `recording.${ext}`, { type: mime });
      const form = new FormData(); form.append('file', file);
      const res  = await fetch(CFG.transcribe, { method:'POST', body:form });
      if (!res.ok) { const t=await res.text(); throw new Error(`${res.status}: ${t.slice(0,80)}`); }
      const data = await res.json();
      const transcript = (data.text||'').trim();
      if (!transcript) { setStatus('no speech detected'); return; }
      const tBar = document.getElementById('transcript-bar');
      document.getElementById('transcript-text').textContent = transcript;
      tBar.classList.add('visible');
      setTimeout(() => tBar.classList.remove('visible'), 4000);
      await sendToLLM(transcript);
    } catch(e){ setStatus('error: '+e.message); }
  }

  // ── LLM ──────────────────────────────────────────────────
  async function sendToLLM(userText) {
    addMessage('user', userText);
    setStatus('generating…');
    setBusy(true);
    const msgEl  = addMessage('ai', '');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    msgEl.appendChild(cursor);
    let fullText = '';
    try {
      const messages = history.filter(m=>m.role!=='system').slice(0,-1).concat([{role:'user',content:userText}]);
      const res = await fetch(`${CFG.host}/api/chat`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ model:CFG.chat, stream:true, messages }),
      });
      if (!res.ok) throw new Error(`Chat error ${res.status}`);
      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read(); if (done) break;
        const lines = decoder.decode(value).split('\n').filter(Boolean);
        for (const line of lines) {
          try {
            const j = JSON.parse(line);
            if (j.message?.content) {
              fullText += j.message.content;
              msgEl.textContent = fullText;
              msgEl.appendChild(cursor);
              document.getElementById('chat').scrollTop = 99999;
            }
            if (j.done) { cursor.remove(); history.push({ role:'assistant', content:fullText }); }
          } catch {}
        }
      }
    } catch(e){ cursor.remove(); msgEl.textContent = '⚠ '+e.message; }
    finally { setBusy(false); setStatus('ready'); }
  }

  async function sendText() {
    const el = document.getElementById('text-input');
    const text = el.value.trim();
    if (!text) return;
    el.value = '';
    await sendToLLM(text);
  }

  function setStatus(t) {
    document.getElementById('status-text').textContent = t;
    document.getElementById('conn-dot').className =
      t==='ready'         ? 'dot online' :
      t.startsWith('error') ? 'dot error' : 'dot working';
  }

  function setBusy(b) {
    document.getElementById('mic-btn').disabled    = b;
    document.getElementById('send-btn').disabled   = b;
    document.getElementById('text-input').disabled = b;
  }

  setBusy(true);
  runStartup();
</script>
</body>
</html>
